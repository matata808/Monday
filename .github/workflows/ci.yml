name: CI

on:
  push:
    branches:
      - main
      - dev
      - "chore/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, audit, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Syntax check backend
        run: find server -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Unit and integration tests
        run: npm run test:run

      - name: Coverage
        run: npm run test:coverage

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Full dependency audit
        run: npm audit --audit-level=high

      - name: Frontend production build
        run: npm run build

      - name: Docker Compose config validation
        run: docker compose --env-file .env.docker.example config

      - name: Backend image build
        run: docker build -f Dockerfile.backend -t monday-backend:ci .

      - name: Frontend image build
        run: docker build -f Dockerfile.frontend -t monday-frontend:ci .
